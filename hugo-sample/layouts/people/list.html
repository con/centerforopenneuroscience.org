{{ define "main" }}
<article class="mx-auto max-w-screen-lg">
  <header class="mb-8">
    <h1 class="text-4xl font-bold mb-4">{{ .Title }}</h1>
    {{ with .Content }}
    <div class="prose prose-slate dark:prose-invert max-w-none">
      {{ . }}
    </div>
    {{ end }}
  </header>

  <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
    {{ range where .Site.RegularPages "Section" "people" }}
    <div class="p-6 bg-white dark:bg-gray-800 rounded-lg shadow hover:shadow-lg transition-shadow">
      <h2 class="text-xl font-semibold mb-2">
        <a href="{{ .RelPermalink }}" class="hover:text-blue-600 dark:hover:text-blue-400">{{ .Title }}</a>
      </h2>
      {{ with .Params.position }}
      <p class="text-gray-600 dark:text-gray-400 mb-2">{{ . }}</p>
      {{ end }}
      {{ with .Params.people_categories }}
      <p class="text-sm text-gray-500 dark:text-gray-500">
        {{ delimit . ", " }}
      </p>
      {{ end }}
    </div>
    {{ end }}
  </div>
</article>
{{ end }}
