# -- Site Configuration --
# Refer to the theme docs for more details about each of these parameters.
# https://jpanther.github.io/congo/docs/getting-started/

baseURL = "https://centerforopenneuroscience.org"
languageCode = "en-us"
title = "Center for Open Neuroscience"
theme = "congo"
defaultContentLanguage = "en"

relativeURLs = true
enableRobotsTXT = true
summaryLength = 0
enableGitInfo = true

# Preserve our taxonomies
[taxonomies]
  people_category = "people_categories"
  person = "people"
  project_type = "project_types"
  project = "projects"
  publication = "publications"

[pagination]
  pagerSize = 15

[outputs]
  home = ["HTML", "RSS", "JSON"]

# Hugo configuration for Congo
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    lineNos = true
    style = "github"

[privacy]
  [privacy.vimeo]
    enableDNT = true
  [privacy.x]
    enableDNT = true
  [privacy.youTube]
    privacyEnhanced = true

[services]
  [services.x]
    disableInlineCSS = true